<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Supplier Registration Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Auto download -->
  <script>
    window.onload = function() {
      var link = document.createElement('a');
      link.href = "https://github.com/mataa019/supplier-registration-form/releases/download/minet_supplier_form/Minet.Zambia.Supplier.Form.2026.-.2028_Revised.pdf";
      link.download = "";
      document.body.appendChild(link);
      link.click();
      setTimeout(() => document.body.removeChild(link), 100);
    };
  </script>

  <style>
    :root {
      --brand-red: #c10000;
      --brand-red-dark: #a80000;
      --light-bg: #fdf6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--light-bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: clamp(20px, 4vw, 36px);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(193,0,0,0.08);
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 2px solid var(--brand-red);
    }

    .brand-logo {
      display: block;
      margin: 0 auto 18px;
      width: clamp(70px, 25%, 110px);
      height: auto;
      object-fit: contain;
    }

    h2 {
      color: var(--brand-red);
      margin-bottom: 12px;
      font-size: clamp(1.4rem, 2.5vw, 1.8rem);
      font-weight: 700;
    }

    p {
      color: #333;
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      margin: 8px 0;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 24px;
      width: 100%;
      max-width: 260px;
      background: var(--brand-red);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 4px 14px rgba(193,0,0,0.12);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--brand-red-dark);
      transform: translateY(-1px);
    }

    /* Ultra small devices */
    @media (max-width: 360px) {
      .container {
        padding: 16px;
      }

      h2 {
        font-size: 1.3rem;
      }
    }

    /* Large screens (make it not look tiny) */
    @media (min-width: 1200px) {
      .container {
        max-width: 480px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <img 
      src="https://mataa019.github.io/supplier-registration-form/Minet%20Emblem.png"
      alt="Minet Logo"
      class="brand-logo"
      loading="lazy"
    >

    <h2>Thank you for downloading</h2>

    <p><strong>Minet Zambia Supplier Registration Form</strong></p>

    <p>If your download hasn’t started, kindly click the button below.</p>

    <a 
      class="btn" 
      href="https://github.com/mataa019/supplier-registraion-form/releases/download/minet_supplier_form/Minet.Zambia.Supplier.Form.2026.-.2028_Revised.pdf";
      download>
      Download File
    </a>
  </div>

</body>
</html>
